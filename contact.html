<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Contact | Patan Fardeen Khan</title>

  <link rel="icon" href="images/icons8-portfolio-50.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

</head>

<body>

  <canvas id="bg-canvas"></canvas>

  <!-- HEADER -->

  <header>

    <div class="nav-logo">
      FK
    </div>

    <nav>
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>

  </header>

  <!-- CONTACT SECTION -->

  <section class="contact-section">

    <div class="contact-wrapper reveal">

      <div class="contact-card">

        <div class="section-label">
          Contact
        </div>

        <h2>
          Get In Touch
        </h2>

        <p>
          Have a project, opportunity, or collaboration in mind?
          Feel free to send me a message.
        </p>

        <form id="contact-form" novalidate>

          <input
            id="name"
            type="text"
            name="name"
            placeholder="Your Name"
            required
          >

          <input
            id="email"
            type="email"
            name="email"
            placeholder="Your Email"
            required
          >

          <textarea
            id="message"
            name="message"
            placeholder="Your Message"
            required
          ></textarea>

          <button type="submit">
            Send Message
          </button>

        </form>

        <div
          id="form-feedback"
          aria-live="polite"
          class="form-feedback"
        ></div>

        <div class="contact-email">

          Alternatively, you can email me directly at

          <br><br>

          <a href="mailto:pathanfardeen555@gmail.com">
            pathanfardeen555@gmail.com
          </a>

        </div>

      </div>

    </div>

  </section>

  <footer>

    <p>
      &copy; 2025 Patan Fardeen Khan. All rights reserved.
    </p>

  </footer>

  <script src="js/script.js"></script>

</body>
</html>
